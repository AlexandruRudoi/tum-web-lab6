name: salon-web-prod

services:
  web:
    build:
      context: ./Salon.Web
      dockerfile: Dockerfile
      target: runtime
      args:
        MODE: production
    image: salon-web:prod
    container_name: salon-web-prod
    ports:
      - "80:80"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
