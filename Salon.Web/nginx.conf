worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        application/ld+json
        application/manifest+json
        font/eot
        font/otf
        font/ttf
        image/svg+xml;

    # Logs to stdout/stderr (Docker friendly)
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    server {
        listen       80;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Long-cache for hashed assets emitted by Vite
        location /assets/ {
            access_log off;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Cache static media
        location ~* \.(?:jpg|jpeg|gif|png|webp|avif|svg|ico|woff2?|ttf|eot|otf|mp4|webm)$ {
            access_log off;
            expires 30d;
            add_header Cache-Control "public";
            try_files $uri =404;
        }

        # Health check
        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        # SPA fallback — every unknown route returns index.html so React Router can handle it
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Never cache the entry HTML
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires 0;
        }

        # Hide hidden files
        location ~ /\.(?!well-known) {
            deny all;
        }
    }
}
